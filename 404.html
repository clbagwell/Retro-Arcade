<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Page not found — Retro Arcade</title>
  </head>
  <body style="font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background:#09090f; color:#e6eef8; display:flex; align-items:center; justify-content:center; height:100vh; margin:0;">
    <main style="text-align:center; padding:24px; max-width:720px;">
      <h1 style="font-size:28px; margin-bottom:8px;">404 — Page not found</h1>
      <p style="color:#9fb3c8; margin-bottom:20px;">This path couldn't be found. We'll attempt to load the application.</p>
      <p style="margin-bottom:18px;"><a href="./docs/" style="color:#fbbf24; text-decoration:none; font-weight:600;">Open app</a></p>
      <div id="loader" style="width:48px; height:48px; margin:0 auto 8px; border-radius:8px; background:linear-gradient(135deg,#0ea5a9,#7c3aed); animation:spin 1s linear infinite;"></div>
      <small style="color:#7a98a9; display:block; margin-top:12px;">If loading fails, click "Open app".</small>
    </main>
    <style>@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}</style>
    <script>
      // Try to fetch the docs index. If that fetch returns our root redirect
      // HTML (in case of unusual host config), fall back to a safe redirect.
      (function(){
        function writeHtml(html){ document.open(); document.write(html); document.close(); }

        fetch('./docs/index.html').then(function(r){ if(!r.ok) throw new Error('no index'); return r.text(); }).then(function(html){
          if (html.includes('location.replace("./docs/') || html.includes('meta http-equiv="refresh"')) {
            // avoid loop, redirect directly
            setTimeout(function(){ location.replace('./docs/'); }, 300);
            throw new Error('redirect-marker');
          }
          return html;
        }).then(function(finalHtml){
          writeHtml(finalHtml);
        }).catch(function(){
          // as a last resort send user to the docs folder
          setTimeout(function(){ location.replace('./docs/'); }, 800);
        });
      })();
    </script>
  </body>
</html>
