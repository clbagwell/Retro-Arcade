<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Page not found — Retro Arcade</title>
  </head>
  <body style="font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background:#09090f; color:#e6eef8; display:flex; align-items:center; justify-content:center; height:100vh; margin:0;">
    <main style="text-align:center; padding:24px; max-width:720px;">
      <h1 style="font-size:28px; margin-bottom:8px;">404 — Page not found</h1>
      <p style="color:#9fb3c8; margin-bottom:20px;">Looks like the page you're after doesn't exist. We'll try to load the app so you can continue.</p>
      <p style="margin-bottom:18px;"><a id="home-link" href="./" style="color:#fbbf24; text-decoration:none; font-weight:600;">Go home</a></p>
      <div id="loader" style="width:48px; height:48px; margin:0 auto 8px; border-radius:8px; background:linear-gradient(135deg,#0ea5a9,#7c3aed); animation:spin 1s linear infinite;"></div>
      <small style="color:#7a98a9; display:block; margin-top:12px;">If the app doesn't load automatically, click "Go home".</small>
    </main>
    <style>@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}</style>
    <script>
      (function(){
        const pathname = window.location.pathname;
        const segments = pathname.split('/').filter(Boolean);
        const repoRoot = segments.length > 0 ? '/' + segments[0] + '/' : '/';
        const rootIndexUrl = repoRoot + 'index.html';
        const docsIndexUrl = repoRoot + 'docs/index.html';
        const redirectMarker = /location\.replace\(["']\.\/docs\//;
        const refreshMarker = /meta http-equiv=["']refresh["']/i;

        function writeHtml(html){ document.open(); document.write(html); document.close(); }
        function loadText(url){ return fetch(url).then(function(r){ if(!r.ok) throw new Error('no index'); return r.text(); }); }

        var homeLink = document.getElementById('home-link');
        if (homeLink) {
          homeLink.href = repoRoot;
        }

        loadText(rootIndexUrl).then(function(html){
          if (redirectMarker.test(html) || refreshMarker.test(html)) {
            return loadText(docsIndexUrl);
          }
          return html;
        }).then(writeHtml).catch(function(){
          setTimeout(function(){ location.replace(repoRoot); }, 800);
        });
      })();
    </script>
  </body>
</html>
