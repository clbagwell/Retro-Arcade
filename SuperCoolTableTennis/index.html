<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Cool Table Tennis</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            background-image: url('https://raw.githubusercontent.com/https-deeplearning-ai/lc-build-with-andrew-platform/main/img/tabletennis43.jpg');
            background-size: cover;
            background-position: center;
            color: white;
            overflow: hidden;
        }
        #setup-screen, #end-screen {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        #end-screen {
            display: none;
            border: 5px solid gold;
        }
        #end-screen h2 {
            font-size: 48px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        #end-screen p {
            font-size: 24pt;
            font-weight: bold;
        }
        .input-group { margin: 15px 0; }
        .audio-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        canvas {
            background-color: green;
            border: 5px solid white;
            display: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #scoreboard {
            display: none;
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
            text-shadow: 2px 2px 4px #000;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 18px;
            background: #f5f5dc;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Super Cool Table Tennis</h1>
        <div class="input-group">
            <label>Winning Score: </label>
            <input type="number" id="winScoreInput" value="5" min="1" style="width: 50px;">
        </div>
        <div class="input-group">
            <label>Difficulty: </label>
            <select id="difficultySelect">
                <option value="0.05">Easy</option>
                <option value="0.1">Medium</option>
                <option value="0.2">Hard</option>
            </select>
        </div>
        <div class="audio-controls">
            <label><input type="checkbox" id="musicToggle" checked> Music</label>
            <label><input type="checkbox" id="sfxToggle" checked> Sound Effects</label>
        </div>
        <button onclick="startGame()">Start Game</button>
    </div>

    <div id="end-screen">
        <h2 id="resultTitle">GAME OVER</h2>
        <p id="resultText"></p>
        <br>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="scoreboard">User: 0 | Computer: 0</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreboard = document.getElementById('scoreboard');
        const setupScreen = document.getElementById('setup-screen');
        const endScreen = document.getElementById('end-screen');

        const sounds = {
            music: new Audio('music.mp3'),
            hit: new Audio('hit.mp3'),
            cheer: new Audio('cheer.mp3'),
            boo: new Audio('boo.mp3'),
            win: new Audio('win.mp3'),
            lose: new Audio('lose.mp3')
        };
        sounds.music.loop = true;

        const paddleWidth = 15, paddleHeight = 100;
        const ballSize = 10;
        const beige = "#f5f5dc";

        let userScore = 0, computerScore = 0;
        let winningScore = 5, aiSpeed = 0.1;
        let gameRunning = false, ballActive = true;
        let particles = [];

        const user = { x: 0, y: canvas.height/2 - paddleHeight/2 };
        const computer = { x: canvas.width - paddleWidth, y: canvas.height/2 - paddleHeight/2 };
        const ball = { x: canvas.width/2, y: canvas.height/2, dx: 4, dy: 4 };

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function playSound(soundName) {
            if (document.getElementById('sfxToggle').checked) {
                const soundClone = sounds[soundName].cloneNode();
                soundClone.play().catch(e => console.log("Audio error:", e));
            }
        }

        function startGame() {
            winningScore = parseInt(document.getElementById('winScoreInput').value) || 5;
            aiSpeed = parseFloat(document.getElementById('difficultySelect').value);
            if (document.getElementById('musicToggle').checked) sounds.music.play().catch(e => {});
            
            setupScreen.style.display = 'none';
            canvas.style.display = 'block';
            scoreboard.style.display = 'block';
            gameRunning = true;
            resetBall();
            gameLoop();
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 4 : -4);
            ball.dy = (Math.random() * 6 - 3);
            ballActive = true;
        }

        function triggerPointPause(scorer) {
            ballActive = false;
            if (scorer === 'user') playSound('cheer');
            else playSound('boo');

            setTimeout(() => {
                resetBall();
            }, 500);
        }

        function update() {
            if (!ballActive) return;

            if (keys['ArrowUp'] && user.y > 0) user.y -= 7;
            if (keys['ArrowDown'] && user.y < canvas.height - paddleHeight) user.y += 7;

            let targetY = ball.y - paddleHeight / 2;
            computer.y += (targetY - computer.y) * aiSpeed;

            ball.x += ball.dx;
            ball.y += ball.dy;

            if (ball.y <= 0 || ball.y + ballSize >= canvas.height) ball.dy *= -1;

            // Collision logic with directional check
            let paddle = (ball.x < canvas.width / 2) ? user : computer;
            const isMovingTowardUser = (ball.x < paddleWidth && ball.dx < 0);
            const isMovingTowardComputer = (ball.x > canvas.width - paddleWidth - ballSize && ball.dx > 0);

            if (isMovingTowardUser || isMovingTowardComputer) {
                if (ball.y > paddle.y && ball.y < paddle.y + paddleHeight) {
                    ball.dx *= -1.1;
                    let impact = (ball.y - (paddle.y + paddleHeight / 2)) / (paddleHeight / 2);
                    ball.dy = impact * 5;
                    playSound('hit');
                }
            }

            if (ball.x < 0) {
                computerScore++;
                triggerPointPause('computer');
            } else if (ball.x > canvas.width) {
                userScore++;
                triggerPointPause('user');
            }

            scoreboard.innerText = `User: ${userScore} | Computer: ${computerScore}`;

            if (userScore >= winningScore || computerScore >= winningScore) {
                endGame();
            }
        }

        function endGame() {
            gameRunning = false;
            sounds.music.pause();
            endScreen.style.display = 'block';
            
            const resultTitle = document.getElementById('resultTitle');
            const resultText = document.getElementById('resultText');

            if (userScore >= winningScore) {
                playSound('win');
                resultTitle.innerText = "VICTORY!";
                resultTitle.style.color = "#00ff00";
                resultText.innerText = "You crushed the computer!";
                resultText.style.color = "gold";
                createConfetti();
            } else {
                playSound('lose');
                resultTitle.innerText = "DEFEAT!";
                resultTitle.style.color = "#ff4d4d";
                resultText.innerText = "The computer was too strong...";
                resultText.style.color = "lightblue";
                createRain();
            }
        }

        // Visual Effects System
        function createConfetti() {
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    dx: (Math.random() - 0.5) * 10,
                    dy: (Math.random() - 0.5) * 10,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    size: Math.random() * 8 + 4,
                    type: 'confetti'
                });
            }
        }

        function createRain() {
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    dx: 0,
                    dy: Math.random() * 5 + 5,
                    color: '#aabbee',
                    size: 2,
                    type: 'rain'
                });
            }
        }

        function updateParticles() {
            particles.forEach(p => {
                p.x += p.dx;
                p.y += p.dy;
                if (p.type === 'confetti') p.dy += 0.1; // Gravity
                if (p.type === 'rain' && p.y > canvas.height) p.y = -10;
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw table lines
            ctx.setLineDash([10, 10]);
            ctx.strokeStyle = "white";
            ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
            ctx.setLineDash([]);

            // Paddles & Ball
            ctx.fillStyle = beige;
            ctx.fillRect(user.x, user.y, paddleWidth, paddleHeight);
            ctx.fillRect(computer.x, computer.y, paddleWidth, paddleHeight);
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ballSize, 0, Math.PI*2); ctx.fill();

            // Draw Rain Clouds
            if (particles.length > 0 && particles[0].type === 'rain') {
                ctx.fillStyle = "#666";
                ctx.beginPath(); ctx.arc(200, 50, 40, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(240, 60, 50, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(280, 50, 40, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(500, 40, 40, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(540, 50, 50, 0, Math.PI*2); ctx.fill();
            }

            // Draw Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                if (p.type === 'confetti') {
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                } else {
                    ctx.fillRect(p.x, p.y, 2, 15);
                }
            });
        }

        function gameLoop() {
            if (gameRunning) update();
            updateParticles();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
